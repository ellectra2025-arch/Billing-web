<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BillPro — Sales Statistics</title>
  <!-- SheetJS for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFD600;
      --yellow-light: #FFF9C4;
      --black: #0D0D0D;
      --red: #E53935;
      --white: #FFFFFF;
      --gray: #F7F7F7;
      --border: #E8E8E8;
      --text: #1A1A1A;
      --text-light: #666;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--black);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .nav-brand { font-family: 'Bebas Neue'; font-size: 30px; color: #fff; letter-spacing: 2px; }
    .nav-brand span { color: var(--yellow); }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-links a.active { background: var(--yellow); color: var(--black); font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .user-badge {
      background: rgba(255,214,0,0.15);
      color: var(--yellow);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,214,0,0.3);
    }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* PAGE */
    .page { padding: 28px; max-width: 1400px; margin: 0 auto; }

    /* PAGE HEADER */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 14px;
    }
    .page-header h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--text);
    }
    .page-header h1 span { color: var(--red); }

    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Filters */
    .filters {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      background: var(--white);
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .filters label { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .filters select, .filters input {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Inter';
      color: var(--text);
      outline: none;
    }
    .filters select:focus, .filters input:focus { border-color: var(--yellow); }

    /* KPI CARDS */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--white);
      border-radius: 16px;
      padding: 22px 24px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .kpi-card.yellow::before { background: var(--yellow); }
    .kpi-card.black::before { background: var(--black); }
    .kpi-card.red::before { background: var(--red); }
    .kpi-card.green::before { background: #43A047; }

    .kpi-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }
    .kpi-label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-value {
      font-size: 28px;
      font-weight: 900;
      color: var(--text);
      margin: 4px 0;
      font-family: 'Bebas Neue';
      letter-spacing: 1px;
    }
    .kpi-sub { font-size: 12px; color: #aaa; }

    /* CHARTS AREA */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .chart-panel {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .chart-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-title .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    canvas { width: 100% !important; }

    /* TABLE */
    .table-panel {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .table-title { font-size: 15px; font-weight: 700; }

    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.data-table thead th {
      background: var(--black);
      color: var(--yellow);
      padding: 11px 14px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    table.data-table thead th:first-child { border-radius: 8px 0 0 0; }
    table.data-table thead th:last-child { border-radius: 0 8px 0 0; }
    table.data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    table.data-table tbody tr:hover { background: #FFFDE7; }
    table.data-table td { padding: 11px 14px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-yellow { background: var(--yellow-light); color: #7B6000; }
    .badge-green { background: #E8F5E9; color: #2E7D32; }
    .badge-red { background: #FFEBEE; color: var(--red); }

    /* BUTTONS */
    .btn {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--black); color: var(--yellow); }
    .btn-primary:hover { background: #222; }
    .btn-yellow { background: var(--yellow); color: var(--black); }
    .btn-yellow:hover { background: #FFC400; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--black); background: var(--gray); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: #aaa;
      font-size: 14px;
    }
    .loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,0,0,0.08);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #aaa;
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--black);
      color: var(--yellow);
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--red); color: #fff; }

    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">Bill<span>Pro</span></div>
    <div class="nav-links">
      <a href="billing.html">🧾 Billing</a>
      <a href="salesstat.html" class="active">📊 Sales Stats</a>
    </div>
    <div class="nav-right">
      <span class="user-badge" id="userBadge">Loading…</span>
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <h1>Sales <span>Statistics</span></h1>
        <div style="font-size:13px;color:#888;margin-top:4px;">Real-time data from Firestore</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-yellow" onclick="exportExcel()">📊 Export Excel</button>
        <button class="btn btn-primary" onclick="loadData()">🔄 Refresh</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <label>Filter by:</label>
      <select id="filterMonth" onchange="applyFilter()">
        <option value="">All Months</option>
        <option>Jan</option><option>Feb</option><option>Mar</option>
        <option>Apr</option><option>May</option><option>Jun</option>
        <option>Jul</option><option>Aug</option><option>Sep</option>
        <option>Oct</option><option>Nov</option><option>Dec</option>
      </select>
      <input type="text" id="filterSearch" placeholder="Search customer…" oninput="applyFilter()" style="min-width:180px;"/>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card yellow">
        <div class="kpi-icon">🧾</div>
        <div class="kpi-label">Total Bills</div>
        <div class="kpi-value" id="kpi-count">—</div>
        <div class="kpi-sub">invoices generated</div>
      </div>
      <div class="kpi-card black">
        <div class="kpi-icon">💰</div>
        <div class="kpi-label">Total Revenue</div>
        <div class="kpi-value" id="kpi-revenue">—</div>
        <div class="kpi-sub">gross sales</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-icon">📦</div>
        <div class="kpi-label">Items Sold</div>
        <div class="kpi-value" id="kpi-items">—</div>
        <div class="kpi-sub">total quantity</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-icon">📈</div>
        <div class="kpi-label">Avg Bill Value</div>
        <div class="kpi-value" id="kpi-avg">—</div>
        <div class="kpi-sub">per invoice</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-panel">
        <div class="chart-title"><div class="dot" style="background:var(--yellow)"></div> Revenue by Month</div>
        <canvas id="revenueChart" height="220"></canvas>
      </div>
      <div class="chart-panel">
        <div class="chart-title"><div class="dot" style="background:var(--red)"></div> Top Products</div>
        <canvas id="productsChart" height="220"></canvas>
      </div>
    </div>

    <!-- Bills Table -->
    <div class="table-panel">
      <div class="table-header">
        <div class="table-title">📋 All Invoices</div>
        <button class="btn btn-yellow" onclick="exportExcel()">📊 Download Excel</button>
      </div>
      <div id="tableContainer">
        <div class="loading">
          <div class="spinner"></div>
          Loading bills from Firestore…
        </div>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB25TUP84C8nkK5XSayTvWadiLBcYWSSzo",
      authDomain: "bill-web-46e16.firebaseapp.com",
      projectId: "bill-web-46e16",
      storageBucket: "bill-web-46e16.firebasestorage.app",
      messagingSenderId: "1021093665998",
      appId: "1:1021093665998:web:7057b87dbf03e4f231049f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allBills = [];
    let revenueChartInst = null;
    let productsChartInst = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      document.getElementById('userBadge').textContent = user.email;
      await loadData();
    });

    window.handleLogout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    window.loadData = async function() {
      try {
        const q = query(collection(db, 'bills'), orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        allBills = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        window._allBills = allBills;
        applyFilter();
        showToast('✅ Data loaded (' + allBills.length + ' bills)');
      } catch(e) {
        // Show demo data if Firestore fails (e.g. rules not set yet)
        allBills = getDemoBills();
        window._allBills = allBills;
        applyFilter();
        showToast('⚠ Showing demo data. Set Firestore rules.', true);
      }
    };

    window.applyFilter = function() {
      const month = document.getElementById('filterMonth').value.toLowerCase();
      const search = document.getElementById('filterSearch').value.toLowerCase();
      let bills = allBills.filter(b => {
        const monthMatch = !month || (b.billDate || '').toLowerCase().includes(month);
        const searchMatch = !search || (b.customer?.name || '').toLowerCase().includes(search)
          || (b.billNo || '').toLowerCase().includes(search);
        return monthMatch && searchMatch;
      });
      renderKPIs(bills);
      renderCharts(bills);
      renderTable(bills);
    };

    function renderKPIs(bills) {
      const count = bills.length;
      const revenue = bills.reduce((s, b) => s + (b.grand || 0), 0);
      const items = bills.reduce((s, b) => s + (b.items||[]).reduce((is,i) => is + (i.qty||0), 0), 0);
      const avg = count ? revenue / count : 0;

      document.getElementById('kpi-count').textContent = count;
      document.getElementById('kpi-revenue').textContent = '₹' + formatNum(revenue);
      document.getElementById('kpi-items').textContent = formatNum(items);
      document.getElementById('kpi-avg').textContent = '₹' + formatNum(avg);
    }

    function renderCharts(bills) {
      // Revenue by month
      const monthMap = {};
      const monthOrder = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      bills.forEach(b => {
        const d = b.billDate || '';
        const m = monthOrder.find(mo => d.includes(mo));
        if (m) monthMap[m] = (monthMap[m]||0) + (b.grand||0);
      });
      const months = monthOrder.filter(m => monthMap[m]);
      const revenues = months.map(m => monthMap[m]);

      if (revenueChartInst) revenueChartInst.destroy();
      const rc = document.getElementById('revenueChart').getContext('2d');
      revenueChartInst = new Chart(rc, {
        type: 'bar',
        data: {
          labels: months.length ? months : ['No Data'],
          datasets: [{
            label: 'Revenue (₹)',
            data: revenues.length ? revenues : [0],
            backgroundColor: '#FFD600',
            borderColor: '#0D0D0D',
            borderWidth: 1.5,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: '#F0F0F0' }, ticks: { callback: v => '₹' + formatNum(v) } },
            x: { grid: { display: false } }
          }
        }
      });

      // Top products
      const prodMap = {};
      bills.forEach(b => {
        (b.items||[]).forEach(i => {
          const name = i.name || 'Unknown';
          prodMap[name] = (prodMap[name]||0) + (i.qty||0);
        });
      });
      const sortedProds = Object.entries(prodMap).sort((a,b) => b[1]-a[1]).slice(0,8);
      const prodLabels = sortedProds.map(p => p[0]);
      const prodData = sortedProds.map(p => p[1]);
      const colors = ['#FFD600','#E53935','#0D0D0D','#FF8F00','#F44336','#FFC107','#212121','#FF5722'];

      if (productsChartInst) productsChartInst.destroy();
      const pc = document.getElementById('productsChart').getContext('2d');
      productsChartInst = new Chart(pc, {
        type: 'doughnut',
        data: {
          labels: prodLabels.length ? prodLabels : ['No Data'],
          datasets: [{
            data: prodData.length ? prodData : [1],
            backgroundColor: colors,
            borderWidth: 2,
            borderColor: '#fff',
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } }
          }
        }
      });
    }

    function renderTable(bills) {
      const container = document.getElementById('tableContainer');
      if (bills.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="emoji">🧾</div><div>No bills found. Create your first bill!</div></div>`;
        return;
      }
      let html = `<div style="overflow-x:auto;"><table class="data-table">
        <thead><tr>
          <th>Bill No.</th>
          <th>Date</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Items</th>
          <th>Subtotal</th>
          <th>Tax</th>
          <th>Grand Total</th>
          <th>Status</th>
        </tr></thead>
        <tbody>`;
      bills.forEach(b => {
        const items = (b.items||[]).length;
        const status = b.grand > 5000 ? 'badge-red' : b.grand > 1000 ? 'badge-yellow' : 'badge-green';
        const statusText = b.grand > 5000 ? 'Large' : b.grand > 1000 ? 'Medium' : 'Small';
        html += `<tr>
          <td><strong>${b.billNo||'—'}</strong></td>
          <td>${b.billDate||'—'}</td>
          <td>${b.customer?.name||'—'}</td>
          <td>${b.customer?.phone||'—'}</td>
          <td>${items} item${items!==1?'s':''}</td>
          <td>₹${(b.subtotal||0).toFixed(2)}</td>
          <td>₹${(b.tax||0).toFixed(2)}</td>
          <td><strong>₹${(b.grand||0).toFixed(2)}</strong></td>
          <td><span class="badge ${status}">${statusText}</span></td>
        </tr>`;
      });
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    window.exportExcel = function() {
      const bills = window._allBills || [];
      if (bills.length === 0) { showToast('No data to export.', true); return; }

      // Summary sheet
      const summaryData = bills.map(b => ({
        'Bill No': b.billNo || '',
        'Date': b.billDate || '',
        'Customer': b.customer?.name || '',
        'Phone': b.customer?.phone || '',
        'Address': b.customer?.address || '',
        'Subtotal (₹)': (b.subtotal||0).toFixed(2),
        'Discount (₹)': (b.discount||0).toFixed(2),
        'Tax (₹)': (b.tax||0).toFixed(2),
        'Grand Total (₹)': (b.grand||0).toFixed(2),
        'Items Count': (b.items||[]).length,
        'Notes': b.notes || '',
      }));

      // Items sheet
      const itemsData = [];
      bills.forEach(b => {
        (b.items||[]).forEach(item => {
          itemsData.push({
            'Bill No': b.billNo || '',
            'Date': b.billDate || '',
            'Customer': b.customer?.name || '',
            'Product': item.name || '',
            'Qty': item.qty || 0,
            'Unit Price (₹)': (item.price||0).toFixed(2),
            'Discount (%)': item.disc || 0,
            'Line Total (₹)': ((item.qty||0) * (item.price||0) * (1 - (item.disc||0)/100)).toFixed(2),
          });
        });
      });

      const wb = XLSX.utils.book_new();
      const ws1 = XLSX.utils.json_to_sheet(summaryData);
      const ws2 = XLSX.utils.json_to_sheet(itemsData);

      // Column widths
      ws1['!cols'] = [16,12,20,14,24,12,12,10,14,10,24].map(w => ({ wch: w }));
      ws2['!cols'] = [16,12,20,20,8,14,12,14].map(w => ({ wch: w }));

      XLSX.utils.book_append_sheet(wb, ws1, 'Sales Summary');
      XLSX.utils.book_append_sheet(wb, ws2, 'Line Items');

      const now = new Date();
      const fname = `BillPro_Sales_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.xlsx`;
      XLSX.writeFile(wb, fname);
      showToast('✅ Excel exported: ' + fname);
    };

    function getDemoBills() {
      return [
        { billNo:'INV-2025-001', billDate:'15 Jan 2025', customer:{name:'Ravi Kumar',phone:'9876543210',address:'Chennai'}, items:[{name:'Laptop',qty:1,price:45000,disc:5},{name:'Mouse',qty:2,price:500,disc:0}], subtotal:47750, discount:0, tax:8595, grand:56345 },

      return Math.round(n).toString();

    function showToast(msg, isError=false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show' + (isError ? ' error' : '');
      setTimeout(() => t.className = '', 3500);
