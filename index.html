<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BillPro — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Bebas+Neue&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFD600;
      --black: #0D0D0D;
      --red: #E53935;
      --white: #FFFFFF;
      --gray: #F5F5F5;
      --border: #E0E0E0;
      --text: #1A1A1A;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--black);
    }

    /* Video Background */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.35;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(13,13,13,0.82) 0%, rgba(229,57,53,0.18) 100%);
      z-index: 1;
    }

    /* Login Card */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: var(--yellow);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--white);
      letter-spacing: 2px;
    }
    .brand-name span { color: var(--yellow); }
    .brand-tagline {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,214,0,0.2);
    }

    .card h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .card p.sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(255,214,0,0.15);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--black);
      color: var(--yellow);
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { background: #222; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #FFF3F3;
      border: 1px solid #FFCDD2;
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
    .error-msg.show { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #aaa;
    }
    .footer-note strong { color: var(--text); }

    /* Decorative yellow bar */
    .card::before {
      content: '';
      display: block;
      width: 48px;
      height: 4px;
      background: var(--yellow);
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,214,0,0.3);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Video Background -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-warehouse-workers-on-a-conveyor-belt-1-1078-large.mp4" type="video/mp4"/>
    <!-- Fallback retail/business video -->
    <source src="https://assets.mixkit.co/videos/preview/mixkit-businesswoman-working-on-a-laptop-in-an-office-23-large.mp4" type="video/mp4"/>
  </video>
  <div class="overlay"></div>

  <div class="login-wrap">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">🧾</div>
        <div class="brand-name">Bill<span>Pro</span></div>
      </div>
      <div class="brand-tagline">Smart Billing & Sales Management</div>
    </div>

    <div class="card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your billing dashboard</p>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        Sign In
      </button>

      <div class="error-msg" id="errorMsg"></div>

      <hr class="divider"/>
      <div class="footer-note">
        <strong>BillPro</strong> — Secure billing platform powered by Firebase
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB25TUP84C8nkK5XSayTvWadiLBcYWSSzo",
      authDomain: "bill-web-46e16.firebaseapp.com",
      projectId: "bill-web-46e16",
      storageBucket: "bill-web-46e16.firebasestorage.app",
      messagingSenderId: "1021093665998",
      appId: "1:1021093665998:web:7057b87dbf03e4f231049f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Auto-redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'billing.html';
    });

    window.handleLogin = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');

      errEl.classList.remove('show');

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Signing in…';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'billing.html';
      } catch (err) {
        const msgs = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password. Please try again.',
          'auth/invalid-email': 'Invalid email address.',
          'auth/too-many-requests': 'Too many attempts. Please wait and try again.',
          'auth/invalid-credential': 'Invalid email or password.',
        };
        errEl.textContent = msgs[err.code] || 'Login failed. Please check your credentials.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    };

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.handleLogin();
    });
  </script>
</body>
</html>
